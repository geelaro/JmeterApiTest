name: JMeter Performance Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'build.xml'
      - 'build.properties.sample'
      - '.github/workflows/jmeter-test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'build.xml'
      - 'build.properties.sample'
  workflow_dispatch:
    inputs:
      threads:
        description: '并发线程数'
        required: false
        default: '10'
      loops:
        description: '循环次数'
        required: false
        default: '1'

jobs:
  # HTTP API 测试 —— 始终运行，无需外部凭证
  http-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz" -o /tmp/jmeter.tgz
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Install Ant
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ant

      - name: Create build.properties
        run: |
          cat > build.properties << 'EOF'
          jmeter.home=/opt/apache-jmeter
          EOF

      - name: Run HTTP API tests
        run: |
          ant -Djmx.file=HttpApiTest.jmx \
              -Dthreads=${{ github.event.inputs.threads || 10 }} \
              -Dloops=${{ github.event.inputs.loops || 1 }} \
              run

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-report
          path: results/**/*.html
          retention-days: 7

      - name: Upload JTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-jtl
          path: results/**/*.jtl
          retention-days: 7

  # MySQL 数据库测试 —— 仅在配置了 Secrets 后运行
  mysql-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz" -o /tmp/jmeter.tgz
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Install Ant + ant-jmeter
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ant
          sudo mkdir -p /opt/apache-jmeter/lib/ext
          sudo curl -sL "https://repo1.maven.org/maven2/org/programmerplanet/ant-jmeter/1.1.1/ant-jmeter-1.1.1.jar" \
            -o /opt/apache-jmeter/lib/ext/ant-jmeter-1.1.1.jar

      - name: Create build.properties
        run: |
          cat > build.properties << 'EOF'
          jmeter.home=/opt/apache-jmeter
          EOF

      - name: Run MySQL tests
        env:
          DB_PASSWORD: ${{ secrets.JMETER_DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "JMETER_DB_PASSWORD 未配置，跳过 MySQL 测试"
            exit 0
          fi
          ant -Djmx.file=MySQLTest.jmx \
              -Dthreads=${{ github.event.inputs.threads || 10 }} \
              -Dloops=${{ github.event.inputs.loops || 1 }} \
              -Ddb.url="${{ secrets.JMETER_DB_URL }}" \
              -Ddb.username="${{ secrets.JMETER_DB_USERNAME }}" \
              -Ddb.password="$DB_PASSWORD" \
              run

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-report
          path: results/**/*.html
          retention-days: 7

      - name: Upload JTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-jtl
          path: results/**/*.jtl
          retention-days: 7
