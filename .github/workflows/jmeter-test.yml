name: JMeter Performance Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'build.xml'
      - 'build.properties.sample'
      - '.github/workflows/jmeter-test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'build.xml'
      - 'build.properties.sample'
  workflow_dispatch:
    inputs:
      threads:
        description: '并发线程数'
        required: false
        default: '10'
      loops:
        description: '循环次数'
        required: false
        default: '1'

jobs:
  http-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz" -o /tmp/jmeter.tgz
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Install Ant
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ant

      - name: Create build.properties
        run: |
          cat > build.properties << 'EOF'
          jmeter.home=/opt/apache-jmeter
          EOF

      - name: Run HTTP API tests
        run: |
          ant -Djmx.file=HttpApiTest.jmx \
              -Dthreads=${{ github.event.inputs.threads || 10 }} \
              -Dloops=${{ github.event.inputs.loops || 1 }} \
              run

      - name: Generate job summary
        if: always()
        run: |
          echo "## JMeter HTTP Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY

          JTL=$(ls results/**/*.jtl 2>/dev/null | head -1)
          if [ -n "$JTL" ] && [ -s "$JTL" ]; then
            # 提取 JTL 中的汇总数据 (xml 格式)
            SAMPLES=$(grep -oP '(?<=<httpSample).*?(?=/>)' "$JTL" | wc -l || echo "0")
            FAILURES=$(grep -oP '(?<=<httpSample).*?s="false".*?(?=/>)' "$JTL" | wc -l || echo "0")
            AVG_TIME=$(grep -oP '(?<=t=")[0-9]+' "$JTL" | awk '{sum+=$1; count++} END {printf "%d", sum/count}' || echo "0")

            echo "| Total Samples | ${SAMPLES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Avg Response (ms) | ${AVG_TIME} |" >> $GITHUB_STEP_SUMMARY

            if [ "${FAILURES}" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo ":x: **${FAILURES} 个请求失败**" >> $GITHUB_STEP_SUMMARY
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo ":white_check_mark: **全部通过**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Status | No results found |" >> $GITHUB_STEP_SUMMARY
          fi

          # 链接到 HTML 报告 artifact
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> :arrow_down: 完整 HTML 报告见下方 **Artifacts**" >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-report
          path: results/**/*.html
          retention-days: 30

      - name: Upload JTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-jtl
          path: results/**/*.jtl
          retention-days: 30

  mysql-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz" -o /tmp/jmeter.tgz
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Install Ant
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ant

      - name: Create build.properties
        run: |
          cat > build.properties << 'EOF'
          jmeter.home=/opt/apache-jmeter
          EOF

      - name: Run MySQL tests
        env:
          DB_PASSWORD: ${{ secrets.JMETER_DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "## MySQL Test :pause_button: Skipped" >> $GITHUB_STEP_SUMMARY
            echo "JMETER_DB_PASSWORD secret 未配置" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          ant -Djmx.file=MySQLTest.jmx \
              -Dthreads=${{ github.event.inputs.threads || 10 }} \
              -Dloops=${{ github.event.inputs.loops || 1 }} \
              -Ddb.url="${{ secrets.JMETER_DB_URL }}" \
              -Ddb.username="${{ secrets.JMETER_DB_USERNAME }}" \
              -Ddb.password="$DB_PASSWORD" \
              run

      - name: Generate job summary
        if: always()
        run: |
          JTL=$(ls results/**/*.jtl 2>/dev/null | head -1)
          if [ -n "$JTL" ] && [ -s "$JTL" ]; then
            echo "## JMeter MySQL Test Results :bar_chart:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            SAMPLES=$(grep -oP '(?<=<JDBCSampler).*?(?=/>)' "$JTL" | wc -l || echo "0")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total JDBC Queries | ${SAMPLES} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> :arrow_down: 完整报告见下方 **Artifacts**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-report
          path: results/**/*.html
          retention-days: 30

      - name: Upload JTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-jtl
          path: results/**/*.jtl
          retention-days: 30
