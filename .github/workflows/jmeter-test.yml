name: JMeter Performance Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'run.sh'
      - '.github/workflows/jmeter-test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'jmx/**'
      - 'run.sh'
  workflow_dispatch:
    inputs:
      threads:
        description: '并发线程数'
        required: false
        default: '10'
      loops:
        description: '循环次数'
        required: false
        default: '1'

jobs:
  http-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3-v2

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            curl -fSL --connect-timeout 30 --retry 3 --progress-bar \
              "https://dlcdn.apache.org//jmeter/binaries/apache-jmeter-5.6.3.tgz" \
              -o /tmp/jmeter.tgz && break
            echo "下载失败，重试 $i/3..."
            sleep 5
          done
          test -s /tmp/jmeter.tgz || { echo "JMeter 下载失败"; exit 1; }
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Run HTTP API tests
        env:
          JMETER_HOME: /opt/apache-jmeter
        run: |
          bash run.sh HttpApiTest.jmx \
            ${{ github.event.inputs.threads || 10 }} \
            ${{ github.event.inputs.loops || 1 }}

      - name: Generate job summary
        if: always()
        run: |
          CSV=$(find results -name "result.csv" 2>/dev/null | head -1)
          echo "## JMeter HTTP Test :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "$CSV" ] && [ -s "$CSV" ]; then
            LINES=$(tail -n +2 "$CSV" | wc -l)
            FAILED=$(grep -c ",false," "$CSV" 2>/dev/null || echo 0)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Samples | ${LINES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
            if [ "${FAILED}" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo ":x: **${FAILED} 个请求失败**" >> $GITHUB_STEP_SUMMARY
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo ":white_check_mark: **全部通过**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Status | No results |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-dashboard
          path: results/**/dashboard/**
          retention-days: 30

      - name: Upload CSV results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-test-csv
          path: results/**/result.csv
          retention-days: 30

  mysql-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/apache-jmeter
          key: jmeter-5.6.3-v2

      - name: Download JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            curl -fSL --connect-timeout 30 --retry 3 --progress-bar \
              "https://dlcdn.apache.org//jmeter/binaries/apache-jmeter-5.6.3.tgz" \
              -o /tmp/jmeter.tgz && break
            echo "下载失败，重试 $i/3..."
            sleep 5
          done
          test -s /tmp/jmeter.tgz || { echo "JMeter 下载失败"; exit 1; }
          sudo mkdir -p /opt/apache-jmeter
          sudo tar xzf /tmp/jmeter.tgz -C /opt/apache-jmeter --strip-components=1
          rm /tmp/jmeter.tgz

      - name: Run MySQL tests
        env:
          JMETER_HOME: /opt/apache-jmeter
          DB_URL: ${{ secrets.JMETER_DB_URL }}
          DB_USERNAME: ${{ secrets.JMETER_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.JMETER_DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "## MySQL Test :pause_button: Skipped" >> $GITHUB_STEP_SUMMARY
            echo "JMETER_DB_PASSWORD 未配置" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          bash run.sh MySQLTest.jmx \
            ${{ github.event.inputs.threads || 10 }} \
            ${{ github.event.inputs.loops || 1 }}

      - name: Generate job summary
        if: always()
        run: |
          CSV=$(find results -name "result.csv" 2>/dev/null | head -1)
          if [ -n "$CSV" ] && [ -s "$CSV" ]; then
            echo "## JMeter MySQL Test :bar_chart:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            LINES=$(tail -n +2 "$CSV" | wc -l)
            echo "| Total JDBC Queries | ${LINES} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-dashboard
          path: results/**/dashboard/**
          retention-days: 30

      - name: Upload CSV results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mysql-test-csv
          path: results/**/result.csv
          retention-days: 30
